  - {type: page-break, offset: 0, content: '', id: KR4d0376_WYG_003-1a, image: WYG1186/WYG1186-0700c.png}
body:
  text: 葦航漫逰稿卷四宋胡仲弓撰五言絶句雪磴石磴不可攀前頭有積雪安得冰玉人對此清髙節曉枕聽禽言山鳥不知名窗前作意鳴自言還自答終始一般聲皆春黃鍾一萌動物物皆陽春天地妙槖籥滿腔都是仁意亭主人心地闊以意名其亭長擕一樽酒坐對前山青題野雲庵庵中有髙人不受紅塵觸吟詩每夜深來伴山雲宿適吾意嘲風詠月天問花尋栁地隨遇可行樂但欲適吾意題陳希夷睡圖形睡神非睡心間身亦間是非都不管髙卧華州山山館對月山寺聞晨鐘深省靜中發展轉睡不成推窗看明月雲思出岫本無心雲在意亦在松檜無髙枝舒卷何所礙詠松獨抱嵗寒心不知時有四赤日行炎天林下自秋至涼飈起深谷清影搖空山醉眠石上人夢中度百灘林髙動輕籟雲靜天無風縹眇笙鶴下依稀鸞佩逢蕭蕭琴瑟鳴灑灑霜露下願期素心人同遊眀月夜髙風過巖麓林杪撼潮海滿地落松花杖履襲清靄潛心寫幽韻洗耳聽寒濤吟聲自搖動誤疑泛魚舠老枝髯鬛動古幹鱗甲翻積陰生潤氣芳菲翳蘭蓀春詠沂水樂吾道蘭亭敘幽情古人不復作四海無吟聲耕釣境莘野特浪耕璜溪豈真釣珍重富春翁此境最髙妙用烏山韻題碧吟卷湖海元龍氣因吟恐負身世間無謁客天下有詩人梅天地有生意驗之陽氣回所以霜雪中春風先及梅溪亭夜集走筆倚柱看潮生漁歌靜中發吟罷寂無聲江風對山月七言絶句次松坡梅花韻滿樹苔痕帶老蒼水邊籬落月昏黃丁寧僮子休教折只聽枝頭獨自香寄越友偶向津頭買釣蓑懷人只隔一煙波扁舟欲渡長江去奈此西湖明月何寄楊藴古匹馬遊邊已千里如何未奏凱歌聲太平不用干戈策辜負胸中百萬兵題武適安寧卷聽琴未了聽吟聲㵼出冰壺一片清學到唐人超絶處前身便是武元衡問梅費盡工夫點綴春暗香動處少人聞近來宫樣梳粧巧只要眀珠不要君孤山問梅每到山邉與水邉有梅花處憶逋仙湖光清淺黃昏月招得先生在眼前用韻答寶葉蒲團出定入玄微盡是山間林下詩安得逺公陪一笑朗吟同過虎溪時客星閣太史當年奏客星知君心事未全清富春果是真謀隱千古何人識姓名莫題詩句纍先生將謂先生亦釣名説與往來臺下客可移一語贈玄英省墳紙灰飛作滿山塵倚遍靈丘暗愴神日暮歸來殽核盡松陰猶有乞墦人梅花盛開有粉蝶衝寒而至翩翩拍舞下瑶階知是東君間諜來深入粉香人不見花心搖落却飛回湖邉湖邉春色濃於酒醉盡東西南北人獨有詩翁清到底一生醒眼看青春斷橋觀釣一竿眀月一絲風心在煙波渺渺中浮世只消如此過何因得似釣魚翁贈易數朱俊甫三絶韋編及太玄潛虛象數究先天前人推算空勞力不似而今賣得錢早行曙色微分星漸稀迎人犬吠出疏籬輕車穩坐誰知我不是坡翁戴笠時曉來曉來對雪看唐詩自暖茅柴酒一巵絶勝五陵貴公子銷金帳下飲羔兒贈嶽仁叔不學弓刀破敵圍卻拈刀筆學兒嬉世間多少真豪傑飄落江湖人不知贈鄭琰狂風吹覆鳯凰巢梟鬼朝翔狐夜號君有胸中千古鑑世間妍醜想難逃九日雨避災野老尋蓑笠送酒人來白衣濕龍山路滑少人登籬下菊花含淚泣春雨中遣懷二首柬梅臞滿園桃李漸成莎為甚東君氣未和莫是陽臺貪作夢晴時常少雨常多蠟屐登山訪草亭前山未放十分青清眀此去無多日不信老天長晦冥訪戴鍊師不值雲淡風輕欲暮時艤舟獨載剡溪湄及門若遇戴安道千古何人更有詩數間茅屋栁成陰中有幽人抱一琴欲訪桃溪無覔處桃溪更在白雲深郊外即事蹇驢逐逐背斜陽才到山間意便涼勿聽鷓鴣行不得雲山深處路尤長林密深藏三四家隔墻古栁著棲鴉牧童兩兩眠芳草不管羣牛食豆花觀海海天雲氣入微茫遙認潮頭數點檣眼界只消如許濶不知何處是東洋即席次韻前山雨過碧紋凹領客携樽出近郊花壓重城歸去晚一窗風月恣推敲倚著欄干句便豪我來登覽奈愁何山河一半無收拾却道東南景最多和趙同叔見寄韻湖海歸來世念輕短篷終日載吟聲天風約住雲來往萬里長空一雁橫滿園桃李手親栽治世何嘗棄不材可恨天南流落客九霄雨露不曽來星星吟鬢已成翁萬斛塵埃一笑空自是黃花留晚節肯將憔悴怨西風次韻早梅枝頭未受雪霜催偏傍江南暖處開不是東君私造物有何憑據作花魁遊瑞源訪修上人羡師儘得山林趣顧我初無朝市心欲把山林換朝市市朝未必似山林題寶葉笑端碧潭秋月句尤奇擊竹拈花總是詩説著推敲便堪笑問師端的笑何時與枯崖悟師振錫歸來又許時苔痕猶汙坐禪衣是非不定空懷古慚愧髙人蚤見幾月臨關長笛一聲天地寒不堪回首月臨關山河不二無全影莫説前頭桂可攀答林顓民鏌鋣如此甘埋光猶向牖下尋筆床轅駒局促不千里堂堂七尺空爾長野燒朝見樵人縱斧斤暮看野火擁紅雲棘叢怕有芝蘭種莫把芝蘭一例焚不礙雲山贏得工夫看好山吟魂飛不到人間白雲本是無心物才得身髙便可攀題勞勞亭流水無情去不還白楊青草滿前山古今多少興亡事人自勞勞亭自間楊仲仁為梅返魂有詩因次其韻窗草不除生意足朋溪瓶梅今似之噓枯茍得一援手寒暖不問南北枝謝娥羌管徒浪説東君造化何容私更得孤根有所托終有結果調羮時久雨桑田萬頃變滄海四海茫茫不見津天漏祗今無補處不知誰是作霖人山中逢老人頭白不知今幾齡兒時猶及見升平可憐野老無知識却認錢塘是汴京世路春山寂寂鎖雲蘿林外鉤輈聲最多不是哥哥行不得祗愁世路有風波趙庸齋為程生作梅窗二字因為之賦作賦何如宋廣平吟詩誰是老逋清庸翁不喜詩兼賦寫與間人作美名題山居十絶鯨音千里送驚濤偏為人間破睡魔待得耳根清靜後覺來醒處已無多右深省翠眉低拂效宫顰近水亭臺剩得春千古淵眀扶不起一枝贈與折腰人右栁塘境於勝處築新巖中有仙翁換骨函門戶本來無鎖鑰白雲從此不須緘右寒巖止水中間別有天濯纓人去自清漣眀珠萬斛歸塵土不及山中一掬泉右掬清許大乾坤滿世間管窺蠡測已為難誰將一線通天竅輸與髙人著眼看右一線天來尋髙處卧吟身泉石中間避世塵莫把白雲都占斷也分一半與間人右雲卧萬里江山萬里天沙平鴈落逺相連西風吹斷雲衣細一葉飛來是釣船右平逺驚濤日夜戰喧豗危甚瞿塘灔澦堆穩把一竿臨碧水三神山上釣鼇來右跨鼇今昨孤山逈不同逋仙誰與管春風暗香疏影無尋處元在泠泠一澗中右梅澗萬仞岡頭著此身乾坤圍裏盡紅塵欲知山水有窮處却是離婁看得真右極目雜興蘇堤拍拍水平湖誰信田間苗欲枯路上行人方苦熱山中七月已圍爐晚春萬紅千紫已摧殘留得荼䕷一架看燕子不知人意懶飛來簾裏訴春寒芭蕉花緑蠟一株才吐焰紅綃半卷漸抽花窗前映月人無寐疑是銀燈透碧紗竹閣萬竿叢裏立嶆峨葉葉清風受用多見説香山老居士夜深猶唱竹枝歌鳯凰臺臺上梧桐失舊栽荒丘寂寂掩蒿萊鳯凰一去不復返引得鴟梟向此來題劉氏東陵圖昔日青門喜種瓜尚遺種子在天涯如今落在劉郎手劉邵原來自一家秣陵山自青青水自流五雲猶繞帝王州誰將千幅鵝溪絹畫出東南一片秋夢中忽思十數年前事只似今朝昨日間堪歎夢中猶有夢浮生能得幾時間衆芳所接㒿倒著醉花傍染得衣巾一味芳説與園丁嚴鎖鑰免教韓夀去偷香端午畫舸縱橫湖水濵綵絲角黍鬥時新年年此日人皆醉能弔醒魂有幾人竹塢洗竹可留三數竿清風葉葉掃詩壇莫言此是藏春塢也有虛心管嵗寒題楊妃上馬嬌圖並轡行春沉醉歸侍兒扶上繡鞍來君王微笑回眸看肻信嵬坡掩面時按此詩出韻曹娥廟黃絹碑殘香草生當時淚眼不曽晴至今流水聲嗚咽猶是曹娥哀怨聲雨中看花頑雲癡雨霸春寒李白桃紅總失歡試問東君因底事却來花上作艱難瓊花潔白全無一點瑕玉皇敕賜上皇家花神不敢輕分拆天下應無第二花碁詩局面年來竟未安一番下著一番難祇今黑白無分別輸與傍人袖手觀寄意三絶燕樓猶在月眀中還却眀珠淚掩紅青鳥不來雲路隔碧桃無復舊春風塵滿胡床淚滿衣深閨寂寂鎖相思一春幽恨無人共手撚梨花腸斷時井底銀瓶事已非鴛鴦打散鴨驚飛千金莫試秋胡婦持向青樓買笑歸走筆次月夜頥齋見寄抱琴時作醉翁吟吟罷霞觴對月斟客有可人期不至相思隔斷暮雲深倚樓月眀獨倚異鄉樓北望天涯幾許愁故國不歸人意老無情汴水自東流聽竇圭琴指按金徽星斗寒試聽一曲話悲歡妙音怕入時人耳携入白雲深處彈元宵緩轡歸來看夜城千門燈火照街眀自疑不是乘槎客却傍銀河星斗行太真卧病圖鬢蟬雕落栁眉顰慚愧三郎不見嗔一病早知尸解去定無羅襪墮邉塵次枯崖問病韻病餘已覺二毛侵湖海詩盟亦懶尋無奈壯懷生萬感黃昏枕上聽蛩吟元日大書春帖當桃符吟對窗前梅一株湖海相逢無老少莫分先後飲屠蘇緑蠟紅紗滿路新翠眉蟬鬢往來人榕陰門戶香如霧十二天街無此春征人婦候蟲唧唧話人愁鎮日思君懶下樓鴻鴈不來邉信隔時憑乾鵲噪櫩頭西風吹老碧桐秋因念征夫事逺逰獨倚小樓重回首飛來一葉是何舟夜坐冥搜聞吟聲青燈耿耿透窗眀一字推敲睡不成只道衰翁自迂濶隔樓亦有苦吟聲南雪半生道路困風沙冰雪駸駸到海涯鉏却舊時桃與李滿園多種木綿花觀西淙千丈瀑布泉聲一𣲖迫人寒疑有癡龍在此間聽了西淙三日雨不知天下有廬山萬斛眀珠萬疊雷分眀激破白雲堆何因捲上銀河去莫放瀨溪橋下來錢塘潮圖吳縑半幅浪如堆開卷晴窗殷地雷一見野人心目爽中秋曽看夜潮來烏衣巷飛雲當日未停驂巷在秦淮水以南可笑異聞唐小説餘風猶襲晉清談翡翠毛羽生來便屬人悔將體段鬬精神寄言翡翠休驚訝但是文章盡纍身晚靜當日濓翁此讀書自編小説愛芙蕖方池靜植香清逺便擬蓬萊小石渠芭蕉為愛芭蕉緑葉濃栽時傍竹引清風近來怕聽愁人雨斫盡簷前三四叢翠涼千章古木影蕭森未必山林如許深才見眼前成緑暗一年又負種花心題夀星寺杯泉勺水原來亦自多便盈科後要如何老龍豈是杯中物放出長江與大河遊九日山散策來逰九日山松風細細襲人寒菊花過了重陽節自是登髙興未闌夜泊朋溪釣隱借得溪亭暫解鞍溪亭擬作釣船看不應隱處近城郭未必終身把釣竿呼猿前度寒林去不回洞門今為小猿開不因擲果為香餌未必人呼肯下來天竺呼猿眠雲嘯月走枯藤不是園丁呌不譍自戀香林不歸去前生恐是住山僧睡貓瓶中斗粟鼠竊盡床上狸奴睡不知無奈家人猶愛護買魚和飯養如兒桃源圖誤入仙源不記春花間一見喜津津可憐塵迹空遺恨一樹桃花經幾秦山行逢樵者鶴髮童顔歌負薪衣襟不染一凡塵擔頭幾點桃花片恐是當年避世人次適安感古二首少陵合與古詩班不是詩家持論寬風雅近來隨世變詩無可採不須官二南風化盛行時里詠塗歌總是詩採到春秋無可採獲麟以後更堪悲次黃瑞玉石鏡韻鑿出巉巖似鏡形年深剝盡蘚痕青世間更有磨磚者欲借鉗鎚與五丁送友人才到離亭淚滿衣雲山千里夢相隨石州一曲陽關酒窨約歸來是幾時和宫怨斜日倒穿龍尾道楊栁半枯秋色老翠華西幸華清宫長門落葉無人掃宫詞漢宫春色傍黃昏曽謁金門奉至尊月上海棠人寂寂焚香百拜感皇恩垂楊枝上喜遷鶯梅子黃時雨乍晴幾陳薰風穿玉殿真珠簾內有歡聲錫宴山亭車馬回三千宫女醉蓬萊繞池逰唱逍遙樂自折紅蓮一朵來深夜逰宫玉漏遲侵晨鶯囀上林時無端蝶戀花心動搖落東風第一枝夜合花開笑語聲敢將薄幸訴衷情祝君聖夀千秋嵗妾願年年引駕行美人戚氏出椒房金縷衣成八寶粧夜靜綺羅香度處瑶臺月下滿庭芳瑶花飛處憶瑶姬一日傾杯十二時青玉案前呵凍手推窗自塑雪獅兒通宵銀燭影搖紅坐對孤鸞伴守宫空有婦人嬌態在眼兒薄媚怨春風桂枝香裏立多時忽見傳言玉女來報道太清歌未徹何妨愛月夜眠遲一自長門芳草生六宫怕見栁梢青玉樓春盡君王懶大小梁州不忍聽玉泉觀魚一潭秋水淨無塵付與羣魚樂性真鎮日倚欄看未足豈知滄海有修鱗秋聲秋本無言那有聲不然風過物飄零此心祗在人心做説與行人莫誤聽飛來峯山染西湖水漾青孤髙長對冷泉亭飛來何不飛將去空與山僧作畫屏快倚亭築得危亭倚太空品題曽屬考亭翁著身髙處不知快多少池臺在下風恭和皇帝宸翰四絶句憑髙望殺舊山川萬里雲迷不盡天汴水流經淮泗去更無人買北歸船中興盛事記磨崖上有千年苔蘚花世變幾經流水去山邉猶有漫郎家放鶴山中訪野梅南枝開了北枝開花神不作趨時態也待鸞輿親幸來御溝鎮日水潺潺安得流紅到世間三十六宫新雨露春風長繞八盤山次藝居無題韻身似浮雲不定棲倚欄覔句聽鴉啼洛陽紙價新來貴吟得詩成就壁題寄方南湖風雨中間奔客程征衣濕盡尚慳晴可人不見空惆悵拍拍一湖春水平次韻順適遣寄擬折芳馨遺所思要將心事共謀惟暮雲遮斷松江路重讀夫君別後詩遊小身巖千古巖隈迹未塵幾多斧鑿幻全身金身丈六猶言小絶倒侏儒世上人瑞香花生處多應散紫芝清香端的與梅期梅花剛被人描畫却是清香人不知劉項祠二祠相望幾春秋祀了龍顔祀沐猴章戴溪南梨嶺北不知何處是鴻溝客裏客裏吟詩幾嵗寒歸來依舊客衣單一冬不見孤山面只買梅花帶雪看水樂洞媧皇昔日奏鈞天一𣲖清音知幾年寄語山靈好收拾不須留與世人傳遊水樂煙霞二洞三絶此是逰山第二回天風吹斷洞雲開人生到處須行樂不為尋梅亦自來愛山分席坐松陰草草杯盤慰賞心水樂不鳴天籟寂數聲幽鳥和清吟象鼻峯前得少留煙霞風景記來逰等間拂石題名姓惹得青雲上筆頭景陽宫井隋師已迫長江滸玉樹庭花曲未終千古龍鸞有遺恨胭脂井上至今紅過桐江三絶解纜移舟浙水濵晚潮初落岸痕新酒酣卧唱江南曲月在篷窗冷照人客星何預漢中興枉把虛名纍子陵千古釣壇如壁立先生去後少人登流水髙山得趣時好音政不要人知絶絃此意誰能會未必盡因鍾子期用韻送驢與源谷長耳追風走似流黔人空使載驢舟巾箱欲置無容處來與騷人欵段逰十二月十五夜雪聽得窗前雪打聲起來眼界甚分眀從前浪説豐年瑞三白如今始作成元宵雪燈火樓臺白玉鋪這般祥瑞不如無誰能斷取維摩手畫出元宵踏雪圖次卓仁夫元宵雪中三絶姑射神人雉扇開三千玉女擁瑶臺十分散布猶嫌少萬斛眀珠抖下來風急梅花片片飛遊人星散市聲稀翻思往日西樓約不至天眀不肯歸繡簾直下整雲鬟歌舞叢中強自歡興盡歸來太多事不如髙卧學袁安古意流水滔滔去不回好花能得幾時開丁寧莫剪門前竹留兩三竿待鳯來秋意淅淅西風響敗欄棕櫚一夜戰聲乾壯心肯逐悲秋老自剔青燈把劍看吳潘二臺官以直言左遷董夕郎亦以薦賢之故相繼翩然而去公論惜之三學叩閽來歸劉聲伯感而賦詩因次其韻三鳯髙飛挽不留轅駒仗馬轉堪羞眀朝封事排閶闔公論從來在士流風采才看聳柏臺如何又遣賦歸來晚年造物多顛倒雷發原來是禍胎觀道君御書帶草行書十數行也隨匹馬到錢塘傷心一幅槐黃紙猶染宣和御墨香鄰雪萬玉叢中願卜鄰世無和靖莫相親石橋春澗留衣鉢端的先生是後人含章殿千古風流説夀陽梅花飄落粉猶香寄言長信宫中女莫學當時亡國粧靈和殿靈和殿下三眠栁舞盡春風入畫圖記得風流年少事青青還似舊時無晚梅次韻凖擬和羮滋味成如何尚帶隔年英春風可是無分別遣放夭桃相並生年少叢中最老成春風一點尚留情先生早晚調羮去説與羣兒莫浪爭懷林梅臞梅花寂寂幾黃昏見説青氊屬耳孫欲訪咸平舊香影無僮無鶴暗銷魂落梅花本無情却有情誰將開落擬浮生盈虛自是天機事錯認樓前羌笛聲南枝不與北枝同及早開時及早空莫笑北枝開較晚前頭畢竟有春風尋梅因探梅花踏曉雲隔墻時有暗香聞枝頭才漏春消息便帶春愁一二分題髙伯夀墨梅才見梅花喜溢眉無聲詩索有聲詩自從即墨移來種莫辨南枝與北枝生來潔白本無瑕翦雪裁冰擅一家堪歎俗流剛點涴故將水墨寫梅花閨情寶鏡愁看淚臉紅銀瓶冷落若為容夢魂不怕關山險飛過巫山十二峯閨怨君居楚尾妾吳頭咫尺天涯作許愁多謝有情江上月夜深分照兩家樓别後粧臺鏡懶開倚門日日望書來西風吹過衡陽雁雁已歸回郎未回雨中有懷幾度懷人風雨中篝燈坐待鼓三通寸心同指長江水君向西流我向東豆粥豆白宜烹玉糝糜絶勝雲子雪翻匙蕪蔞亭上氷霜裏曽與君王療一飢祕書省墨竹寫出此君真面目筆端造化少人知我疑與可今猶在安得東坡共賦詩聞西事有感春水方生秋又殘上流無處避風寒杜鵑飛向東南去怕見如今蜀道難桐廬縣富春山下桐廬縣江水縈回千萬峯縣宰何人真解事做官來向畫圖中徘徊花獨擅春花掩衆芳薔薇水洗內家粧可憐清氣無收拾惹得間人衣袖香秀野世路荆榛日日深山居抱膝且長吟便教定亶無公論不到風聞松竹林贈張南金談星乃祖乘槎去復還君平饒舌世人傳天機不道因渠泄更遣雲仍學算天談星陳炎發求詩從來此物最瞞人術好多為造物嗔若把天機全泄漏罰教甘石一生貧讀後村梅花百詠曾被梅花纍十春孤山蹤迹斷知聞百篇依舊相嘲弄却恐梅花又怕君不如歸去禽言自是不分明誰信西川帝子靈千古傳訛無訂正至今春晚誤人聽江郎山巫山有石稱神女何事江山亦號郎豈是世情強分别從來造化有陰陽觀盡千山與萬山幾曾得似此峯巒誰能移向西湖上併與西湖一樣看雪中有感閭閻愁歎不堪聞風雪如何更作嗔白玉樓臺銀步障只宜富貴不宜貧
