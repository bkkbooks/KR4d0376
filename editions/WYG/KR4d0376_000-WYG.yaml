body:
  text: 提要葦航漫逰稿四巻别集類三宋臣等謹案葦航漫逰稿四巻宋胡仲弓撰仲弓字希聖清源人其生平不少槩見惟集中一第詩有衣冠新進士湖海舊詩人之句知嘗登第夜夢䝉仲作二象笏詩有嗟余初筮令之句知嘗宰縣將之官越上留别諸友詩有一官如許冷况復是清貧槐市風何古蘭亭本却真之句知官在㑹稽老母適至時己見黜詩有千里迎阿㜷相見翻不樂微禄期奉親親至禄己奪之句知不久罷歸雪中襟興詩有不被功名縛江湖得散行之句知被斥以後浪跡以終故以葦航漫逰名稿其行事則不可考矣仲弓詩名不甚著惟陳起江湖後集録所作頗夥然校以永樂大典分列于各韻下者起所選之外遺佚尚多今蒐採裒輯編為四巻雖未必盡覩其全視起所編則己增益者多矣南宋末年詩格日下四靈一𣲖攄晩唐清巧之思江湖一𣲖多五季衰颯之氣故仲弓是編及其兄仲參所著竹莊小集均不出山林枯槁之調如七言律中旱湖一首當㓙祲流離之時絶無惻隠乃云但使孤山梅不死其餘風物弗闗情尤宋季㳺士矯語髙蹈之陋習然吟咏既繁性情各見洪纎俱響正變兼陳茍非滛慝之音即不在放斥之列詩家有此一格固不妨使之並存亦録唐詩者不遺周曇咏史之例也永樂大典所載别有漫逰集一書核其體例盖採宋元兩代之作彚為總集當時校讐未宻朱書標目往往與此集混淆今並考校姓名刪除訛異不使與此集相亂庶幾猶存仲弓一家之體不失其真焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
