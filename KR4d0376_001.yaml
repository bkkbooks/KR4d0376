body:
  text: 葦航漫逰稿卷一宋胡仲弓撰五言古詩石軒席上分韻得石字解衣坐虛窗夜闌萬籟寂月出東南隅照我樓半壁對影欲起舞袖短不成拍浩歌慰心賞歡聲動金石拊欄發長嘯清風生兩腋吟聲鬼神悲醉眼江湖窄吾自樂吾生光隂似過客物我打一塊天地失形跡山鶴從何來㸃破春空碧我欲從之逰八荒隨所適戞然鳴一聲雲深何處覔余用十字為座右銘因足成一首不貪以為寶持戒如護珠暮夜金可納鬼神不可誣男兒重氣義何物分錙銖渴飲盜泉人靡靡真凡夫咏氷羣隂正膠轕結作千丈氷江河凍欲枯雪意猶慿陵舟楫不可濟水波那能興世路多風寒履此何兢兢本是汙濁流一合乃許凝陽氣動地回隂無間可乘一旦自消融紅日東方升送沈錬師歸武夷仙骨久已蛻尚遺空石函白雲最深處猿鶴情相諳松花飢可飱渴飲寒泉甘招邀武夷君清風資𤣥談焚香禮象緯步虛聲摩空升真古洞天依稀五明宫寶珠如黍米懸懸太虛中鍊師於此時金丹滿爐紅念昔逰四首昔年逰徑山身在九天上倚欄少徘徊八極歸一望秋容淡如洗景物呈萬狀松風奏琴筑烟嶼列屏障清逺嘯枯藤野鶴唳幽曠僧僮課梵唄婉娩如學唱解帶臨西風灑落無盡藏緇流亦可人邀往坐清曠盤飱飣黃獨侑之茅柴釀感師有古意愧我無酒量長嘯下山來一路時膽壯重作記逰篇付之覆瓿醬昔逰金山寺一葦破滄溟怒濤正拍天風雨歘晦冥江豚急吹浪水靣轟雷霆滿船失顔色莫辨死與生此時婁師德髙卧看長鯨過午忽開霽濟岸猶登瀛清風泛我衣陽光射簷楹舟人相慰勞山僧笑出迎行行金鼇背月鑑浮空明波平濛天影潮靜聞經聲殿閣耀金碧守護真龍形繫纜少沉吟紅輪江西傾炬火爍江面直使潜鱗驚因成一宿覺問津維揚城重來知幾時未計嵗月成昔逰虎邱山滿天飽風雪氊帽騎欵假瘦嶺衰草歇下馬獨支笻十步八九蹶石路古木僵鐵花露土骨生公何在許空堂掛明月衲僧九十餘持戒常精潔講經石㸃頭竒哉廣長舌我來欲參請云無法可說有井無轆轤歸去心如渴昔逰半山寺木落山欲童秋髙嵐氣旺曉日出曈曨杖藜破莽蒼舉步生清風登堂發一笑絶倒臨川公舊像人所祠新法人所攻空使百年後直筆誅姦雄不知老瞿曇衲被和頭䝉是非不到耳靜坐薝蔔叢自吹無空笛聖處時一中我亦有髮僧誤踏京塵紅來此欲安禪懶性學虛空入門被師喝歸去成匆匆夜夢䝉仲書監作二象笏與余各分其一覺而有賦古人創一物在理不在飾持此非備忘潔白貴彰德世無骨鯁臣朝夕侍君側善惡缺書諫唾罵誰擊賊吏進思效忠官執欲稱職姦回濁天縡孰任排格力願為顧少連勿學元友直上意方簡在竹符畀泥軾政成秉介圭入覲朝北極簮筆裹紫囊玉立凛正色顧余初筮令寒餓日驅迫手板非倒持倚席懼引慝分我意何厚榻前便指畫一夢雖難憑品秩從此得毋但嘯西爽清談更何益課最璽書來洗眼看黃敕汲引㑹有期并力扶社稷夢黃吉甫夢傳失之妄晝冀見而想原注列子周穆王篇晝想夜夢神形所遇故神凝者於夢自消衛玠總角時常問樂廣夢廣云是想玠曰神形所不接而夢亦豈想耶廣曰因也豈伊不可懷而使我心往山林老顛眴原注詩東山伊可懷也揚雄美新文嘗有顛眴疾恐一旦先犬馬眴音縣數日占黃壤原注孫皓曰瞑目黃壤當復何顔見四帝乎舟輿來何遲原注古詩軒車來何遲北望屢戃恍西城薺花時落魄隨兩槳原注酈生傳落魄無衣食業魄音薄嵗晚舟渚靜水消烟渺莽原注柳詩日出洲渚靜澄明皛無垠躊蹰壁上字期我無乃廷原注詩揚之水無信人之言人實廷女左傳子無我廷山中夜聞虎嘯日落山色黃樵夫不敢下風號萬壑哀鳥雀亦驚怕人謂斑將軍此地正爭霸數聲地欲裂咆哮直深夜道人鐵石心慣聽何足訝若逢萬户侯羽鏃不汝赦僧過澗圖溪急水搖石野僧躡石度寒流漾笠影歷險無窘步僕夫後嶺來木末跡樵路蒼茫盼精藍慘淡沒烟霧憶昔山中行顧瞻歌陟岵今猶夢見之覺乃忘其故畫師從何知展玩失毫素悵然渺豫懷江鄉碧雲暮山中聞猿山人猶未去空使山猿驚迎風坐枯藤吟作長短聲山猿汝何知亦有故舊情人兮不如猿冷暖隨時生不見求友鶯喬木長嚶嚶感古十首卞氏璧難售淵明琴本瘖自衒亦可醜三獻機轉深無絃避俚耳舉世誰知音所以古達士萬事何容心勿學卞氏璧請事淵明琴管蔡厄周公陳蔡厄夫子聖人於此時所俟惟一死絃歌乃自如赤舄亦几几未明周孔心道統安所恃天茍喪斯文墜地扶不起豫讓口吞炭智伯頭已漆報仇須及晨安用詐行乞飲器骨已枯癩啞特小術壯士死於義千古猶一日棄主事讎人萬死奚足恤相如歸全璧范增撞玉斗為主心固同逆順異所守發怒俱忘身裂眦欲碎首此完彼玷缺盡在一舉手萬形各有敝斯名長不朽共工觸不周荆卿悲易水所遭雖異時等為血氣使爭帝力已窮報怨反害已一為狂夫愚一為刺客靡二者俱無成三歎而已矣商君金徙木趙髙鹿為馬徒欲取民信疑心隨解瓦罔民適自欺何以刑天下四維已滅亡命脈存已寡焚書火咸陽斯言信非假四皓隱商山子陵隱嚴瀨隱身非隱名清致一何在羽翼若為成狂奴滋故態一出竟奚為名被世人賣所以終南山捷徑不可再范蠡泛五湖子房從赤松功成乞身退明哲保令終彼美二丈夫世異轍則同此道久不作利欲塵相䝉急流不知返失腳機穽中惠連夢春草江淹夢彩筆一夢何足憑材名繇此出讀書三十年僅可變形質所向如面墻此語難致詰何事殷武丁因夢得良弼杜康精酒法陸羽修茶經標致雖不同均是勞吾形采薇及茹芝亦掇天地英𤣥酒非麴糵或可通神明天不生杜陸人間無醉酲山中值雨偶成山中雲氣多忽合即為雨垤鸛鳴一聲毒龍戲吞吐翻手覆手間紛紛不可數彼蒼難致詰隂晴竟誰主此雨只在山何以澤下土阿香推不來借我霹靂斧斫破太虛空銀河漏莫補風雲只片時一施天下溥采采歌朝采畹中蘭暮采籬下菊采采復采采終日不盈掬為憐芳潔姿忍受紅塵觸采蘭殺風味采菊盈芬馥落英固可飱何如飽藜藿秋香亦可紉何如鳴佩玉俾爾全其天得志在巖谷所以山中人終身抱幽獨次陳藝居問訊後村韻人心真灔澦世路多殽函此險久已涉此味久已諳易節固不可貧賤分所甘浩歌一長慨書與識者談清夜萬感集風蕩雲物空倚樓看星斗照破泥丸宫靜觀人世人顛倒醉夢中佳趣有誰識睡覺窗前紅後村來書有此心如珠有物䝉之之語藝居有詩再用前韻襟抱天樣寬萬象并包函富貴一蟲臂此理君飽諳直語苦如荼回味留餘甘吟詩秉史筆未數司馬談男兒重意氣咄咄寧書空笑人愧鄧禹扺掌隨臧宫信是心如珠有物䝉其中非珠亦非物㸃雪付爐紅晴溪晴溪湛如酒越兒中拍浮羡之不可學徒倚溪上樓直下數逰魚咳唾魚驚愁偷生幾漏網為龍知何秋明朝是嵗除明朝是嵗除萍梗身如寄年光馬行疾時事令人醉直語顯官嗔上書明主棄但作送窮文慎勿言災異四時月春月如處女皎皎暮雲間嬋娟不自衒欲見乃許難春雲多變態玉貌長端端封姨掃塵匣略與幽人看夏月如循吏見者皆歡顔當此烈日餘和氣一夜還龔黃久不作元在青雲間欲往從之逰天髙恐難攀秋月如翰林標致清如許天上白玉堂子獨於中處夜直五雲邉氷壺了無滓幾度醉歸來安用金蓮炬冬月如御史正色凝雲端風霜何凜凜一見應膽寒烏飛繞三匝禁樹相團欒心術晦昧人不敢擡頭看老母適至時已見黜千里迎阿㜷相見翻不樂微祿期奉親親至祿已奪所悲乏故交何以寓漂泊向來耿介心饋遺拒不諾及兹誰賑恤俯首念囊槖空餘聲譽在未足救飢渴傳言仁義飽理豈填溝壑况因直道黜自省何愧怍阿㜷幸無憂兒有平生學嵗饑郡行賑恤過餘杭呈辛縣尹山城百貨集富庶如豐年市有醉人臥野無餓莩眠天目發深秀餘不原注平聲流清妍山花墮酒盞水鳥上漁船祿薄吏如隱心閒令欲仙人言風土美我羡長官賢何須論赤望此地稱華顛送懷玉之越謁秋房使君紛紛人海中有客面如鐵前日方逰吳今日又走越一身天地間行役勞嵗月問子去何為豈是事干謁往訪蓬萊翁欲換詩仙骨此行遇故知茂林有清樾元龍百尺樓千鈞引一髮妙年負壯志三軍不可奪不見韓致光虎鬚手曽捋不見燭之武雖老更竒崛一杯壯行色肯作兒女别朔風正凝寒柳已不堪折贈子一枝梅掉我三寸舌臨風語未終長江櫓聲發送方及民罷官東歸咄咄復咄咄北地多霜雪誰能路坦夷驥足亦遭跌天風本不惡鳳翅乃爾折材大用則小人巧已則拙問訊既不通去就當早决雖厄阮籍途難斷張儀舌木天宜晚開紫薇遲後發㑹有溧水公薦書來不絶邀月坐中庭邀月坐中庭清影不可駐舉酒澆枯腸落筆缺長句瀣氣惟沾衣秋聲逺鳴樹磕睡依危欄夢斷足幽趣山行八韻山行有竒觀勝處每自省振策響巖石探入烟霞境洗耳聽泉聲緩步踏松影幽鳥吟清風塵夢忽喚醒一僧從吾遊策蹇度峻嶺山家喜客來呼兒瀹新茗班荆坐茅櫩欵話清晝永何日遂歸耕來此謀二頃七言古詩中秋望月呈諸友長空萬里琉璃滑氷輪碾上黃金闕清光爍盡滿天星桂枝搖落蟾蜍活故園此夕盡翹首望殺陰精眼瀝血烏鵲繞樹飛且鳴世間晝夜無分别詩人兀坐氷壺中清氣蕭蕭透毛骨玉簫何處招鳯凰更抱琵琶對風撥可人來赴今秋期共舉霞觴酌明月醉邊且盡今宵歡後㑹相望隔閩越過大官嶺大官小官相送迎閒雲割斷前山青前山萬仭如壁立南轅北轍何時停憧憧來往成何事中有一路通天庭天庭走馬平如掌胡為此地勞其形從來大官無險阻小官跋涉真零丁道人長嘯烟霞表祝君一語君須聽大官小官喜經歷咫尺前頭是相亭晉安城東溫泉女媧補天愁天破石底千年埋宿火火蒸泉脈為溫湯鑿開浴沼涵天光美人含羞弄清泚一朵芙蓉蘸秋水起來無力著纎裳氷肌縹眇輕雲香人間何福能堪此好與天家浴仙子曾聞前代有華清玉龍活動真妃驚吾皇仁聖格天地天錫𤣥符地呈瑞風雷奔擊鬼神呼溫泉一夕移燕都夜聞琵琶金波西流雲路潔千星萬星猶㸃纈身世如在氷壺中髙卧風櫺賞清絶誰家撥動鬱輪袍自抱心聲細推說猝然聞之耳亦清徐聽令人心欲裂八音獨有絲聲哀似此琵琶聲更切龍香動處絃欲折自撥一聲三擊節湓浦有人曾話别舟中夜聞金縷掣司馬酒腸剛似鐵淚珠亦就青衫結清音巧作聲嗚咽此器特為愁人設韻如寒泉清且冽安得曹綱同一撥曲終忽作裂帛聲萬籟沉沉天地濶次韻送水紋簟與藝居火雲飛空風日惡展轉吟身何所托珊瑚為枕玉為床數卷新詩慰寥寞湘紋曽浸水晶寒有時才展生微瀾持與藝居作清供百年强健長追歡何日一樽陪李賀羽扇綸巾看髙卧談星林漢留求詩君貧賣術我賣文君貧似我貧一分君挾天盤走湖海我携破硯登青雲兩窮相值君莫笑賣文有時飢可療天邊一㸃少微星㑹與太陽來合照秦氏樓秦氏樓中雙飛燕樓前栁絮沾人衣春風輕薄穿繡幃抱琴指按黃金徽鼓終一曲三歎息思君子兮何時歸題葉山甫見惠古琴走筆以謝南風之歌久絶響生民不作聲希想聲音之道與政通審音知政惟絲桐堪嗟世道多翻覆幾度桑田變陵谷摩挲古物憶當年人在春風和氣天治世之音安以樂斯琴當年羽衣作物換星移閲幾周不圖今日為君留袖來贈與無絃客得之何啻如圭璧籀文篆古未為奇我思古人珍祕時古人不可得而見見琴如見當時面安得尋聲問爨人為吾一洗琴上塵子經昔有黃筌玉筍圖故人陳衆仲題詩其上後為人易去常追憶不已余往借觀臨之以歸鄭氏并識以詩春雷殷殷盎中鳴籜龍驚起頭角獰斕斑裂土穿石出長讒斸下津浮玉山人嗜之比八珍畫師寫生傳千春纎纎翠交烟雨濕山人嘆嗟山鬼泣玉堂修撰富才情歌詩贊畫增晶英春花欲語嬌倚檻蜀錦魯縞光可鑑無端五窮睹揶揄巧偷當面輸陶朱我從借觀弄毫素座間一夕珠還浦自知詩盡劣陳黃無人豪奪君無藏蛛絲巧蛛絲雖巧能害物蠶絲雖拙能利人害物晨昏一飽足利人往往害及身乃知巧者能逺禍拙者生死常為鄰吾寧為蠶勿為蛛所願殺身以成仁千絲萬縷何足恤要令寒谷皆陽春精衛子房鑄鐵報韓仇智者反為豪俠誤傾秦豈在博浪沙繼世自聞嬴業仆吁嗟精衛亦償寃一旦奮飛身不顧銜石填海抑何愚豈在朝朝與暮暮精衛精衛汝不知滄海終有陵谷時感興有絲不繡平原君有金不鑄鍾子期此心抱獨無人㑹百年只有青天知青天冥冥不可詰舉頭當中有皎日從來天日不可欺何用區區守暗室錢塘潮圖輕綃淡墨天冥冥眼中似覺對西興銀山大浪萬鼓過海潮逆上江倒行前年南遊此餞别親友握手難為情酒酣拂袂不忍顧欹枕仰看雲帆輕平生浪跡半天下搖毫掉舌終何成并州故鄉真可畫新生白髮星星明抱拙以三通鼓為韻見寄次韻夜闌缺月浸寒潭亂山倒影空中涵此時萬籟寂無語碧雲鬱結如晴嵐可人已趁春風去舉杯對影成三三割席賦詩鬬擊鉢舟中醉卧推枕函紅塵眯目空相蒙千金市駿輕花驄何如濃墨恣揮灑筆鋒掃退江丈通錦繡叢中燕鶯侣惜花愛作風光主何如揮塵共清談朝訪安石暮夷甫焚香燒燭恣狂吟管甚鼕鼕催五鼓寄懶庵天寒日短道路長白雲飛處知吾鄉大江之東渭之北念我故人何可忘别來楊栁春依依只今開到梅花香扁舟漫浪歸未得京塵海裏安行藏身名未立仰天笑牀頭夜夜鳴干將羡師物外無寵辱庭前柏樹常蒼蒼吁嗟無羽飛不到二千里外空相望五雲前墜滿室光報師之意無以將篇詩濃墨才淋浪一聲鴈過天南翔
