body:
  text: 葦航漫遊稿卷二宋胡仲弓撰五言律詩舟中夜聞彈箏艤舟尋近岸餘興月明中鼓瑟人何在彈箏意略同聲和隨去浪調古動悲風銀甲無由見清音出繡櫳竹夫人虛心陪燕寢不受虢秦封惟有氷霜節全無雲雨踪李娥書舊恨湘女斂愁容却是専房寵無人妬阿儂泛舟分韻得橫字艤舟迷近逺鷗鷺許同盟潮落沙仍漲風晴浪不驚一川平野秀半嶺斷雲橫後約何時再吟篷卧月明湖邊乍過黃梅雨湖邊物色饒水深宜鳥浴藻密礙魚跳露重荷傾蓋風髙栁折腰道人勤借問此地好漁樵山臺赴召世道今如許先生亦肯來一番新詔命只是舊山臺心事雲間鶴詩情雪後梅諸公興黨論未可薦人材漫興大笑出塵間吟身得暫閒解衣臨水閣倚杖看雲山歸鳥聲如市騎牛歌更蠻明邊一㸃墨元是野僧還逺眺袖手獨憑欄乾坤杯酒間此心常坦易何地不寬閒木落山頭秃氷堅水靣頑梅花可人意一見一開顔題潘庭堅響玉集後陛對端平日雄文四海傳一登黃甲後多在紫巖邊好客時招飲貪詩夜廢眠寥寥三百載先後兩庭堅湖獨坐過湖船涼生欲暮天鷗眠汀草亂魚躍浪花圓足迹烟霞外吟聲風月邊萬緣無所缺只缺買山錢旅中早行前山風雨暗欲去路還迷燭影照行李鐘聲催曉雞年光銷旅况秋氣入征蹄如此困行役何時歸去兮還翁雪舟吟卷世間迂闊者端的是詩人獨坐無生計相逢盡說貧如君追古作與我最情親切莫輕辜負元龍湖海身贈陳通妙雙成親囑咐從此厭塵緣天上黃冠侣人間紫府仙金爐行殿曉玉磬古壇烟待得蟠桃熟重逢又幾年除夕寄弟年華今告老人事亦如斯漢殿藏鈎戲戎家守嵗時世情方役役雨意正垂垂強作屠蘇醉椒盤欲頌誰和雲心除夕韻嵗除明日是心事落梅邊節物催雙鬢情懷缺少年桃符依帖寫竹爆應聲圓椒頌無人獻酴酥亦自煎贈雲谷道士身形如野鶴飛去每離羣玉磬隨緣定金丹與衆分渴搖花上露卧枕谷中雲傳得九仙訣修真好似君矮道人白髮蒼顔老孩童三尺身向來陽刺史留得道州人鳬膝應難續龜趺卒莫伸朝家無嵗貢流落瘴江濱送丁鍊師歸福堂易東流派逺千載見斯人金鼎烹龍虎丹書役鬼神形臞心更古食淡語尤真野鶴冲天去空餘華表身失腳失腳江湖久憂時鬢欲皤壯心馳北闕癡夢繞南柯萬里關山逺一春風雨多窮櫩茅屋下忍聽扊扅歌湯惠院以五言定交用韻以謝阿雍才識靣轉盼便回春藥籠還君富詩囊笑我貧學遵東魯訓句逼晚唐人五字論交意吟邊憶李頻春郊晚歸苔錢隨履跡柳絮㸃春衣塔影留殘照鐘聲出翠微扶將藜杖去挑取錦囊歸緩步微吟久重城半掩扉金粟道人曽食如瓜棗蟠桃幾度開石榴書壁去金粟滿包來雲氣侵丹竈春山入酒杯步虛聲漸逺何處覔蓬萊散策郊行有懷社友散策尋詩料過從野老家水寬蛙世界花暖蝶生涯翠箔風為捲青山雲半遮懷人千里外搔首夕陽斜寒碧席上薪隱分韻得初字心逺塵難到髙堂便讀書鳯歸巢已覆鶴去柵常虛野水平荷葉清風繞竹廬靜邊生萬感况復晚涼初觀海口占揚帆飽風腹望眼無東西天圍滄海闊日射崑崙低魚鱉夜深泣鴻鵠空中迷風濤且莫作心撼神龍棲枯崖韻速藏叟和篇暗塵侵古鏡抱膝月臺吟大吕呼不出小詩留至今五言詩未下什襲意何深莫是推敲了禪餘自賞音和溪翁二首學僧居丈室不似客途中獨榻卧明月長廊受晚風書癡成病懶詩債喜窮工汩汩塵埃者吾今愧此翁片帆湖海闊移纜晉江濱客思蛩邊老秋蟬鴈外新同吟兒對榻獨酌影隨身暗卜歸時節修書托便鱗燈花根頭餘寸草結作數層紅預卜門庭喜非關造化功開時常入夜落後不因風誤被燈蛾撲從知色是空妙覺山用老溪寶葉二僧韻登山無杖䇿元不事依憑斜照穿林影行雲礙石稜鳥啼悲宿草猿飲掛枯藤曽著髙僧住何人為續燈庵居天半壁古道擬山隂風徑松鬚落石髙泉眼深鐘聲清嶂合幡腳翠嵐侵二妙堪名世詩人曽賞音凌霄塔浮圖山盡處八表浩無涯腳踏雷轟石眼生陽艷花天圍連海岱雲氣雜烟霞如此真孤絶學仙能幾家答頥齊併呈諸友隂晴千古事落在醉吟中佳句何人續清樽此日同幕天浮大白繡地纈殘紅江上峯如舊湘靈曲未終答晚香一巢如燕寄來傍主人居著腳須教實圖名却是虛髭因吟盡摘愁遣酒能鉏乾鵲簷前報天邊有吉書次韻答頥齊雀羅門外設塵逺市㕓居抱膝吟梁父摩聲賦子虛苔錢何用鑄草帶莫教鉏世事難開口休投北闕書答青山閣見寄詩人無俗事侵曉訪僧居山近市聲逺樓空松影虛耕雲雖有地種藥恐無鉏但學觀心法何須課佛書次韻答方元吉新知如舊識話久覺情真雲出壺山早風行晉水春家貧因過客世變為詩人曽㸃龍門額煩君再問津為續藝賦藝居老衣鉢付與寧馨兒舊種無多葉生香不斷枝折芳歸藝圃賸馥入詩脾粉省他年事清名當自期青蓮寺避暑盡日畏炎夏隨緣到上方此心無熱惱何地不清涼欵話移禪榻髙眠背夕陽衣巾並枕簟長帶佛爐香驟雨神龍奮頭角頃刻致風雷雲逐溪南去雨從山北來炎凉分枕簟灑落滿樓臺物物皆霑足餘膏及草萊贈談山人地僻人稀到柴門鎮日開依山泥藥竈纍石築經臺野鶴連窠買梅花間竹栽世無真隱者只此是蓬萊夜過蕭寺尋僧過野寺清話捧茶甌幡影風生樹鐘聲月在樓梅花薰紙帳貝葉看銀鈎為問西來意因成一夜留長人詩裙長難掩膝絶似漢金人樓志幻全體天丁現後身眼髙傾四海力大引千鈞手挽銀河水來㳙衣上塵洪樓分得車字韻江湖詩境濶終不似樓居老怕吟氊冷生來酒興踈愛閒隨有鶴因病出無驢原注數日足疾莫笑柴扉窄猶堪長者車送趙庸齊去國十年居要路依舊老書生公論是非定宗臣去就輕羣鴉分地噪一鳯仰天鳴善類俄星散何因見太平山居懶踏紅塵路山居世念輕澆蘭清夜氣撼竹引秋聲缺月當欄掛間雲貼水輕不知何處鶴亦作太平鳴山扉風自掩地僻少將迎竒字挑燈看新吟擊鉢成鳯花開自落螢草腐還生靜聽鄰琴響疑調慢角聲寄林可山相去各天涯江湖㑹面遲數年不通問一見便言詩近世無和靖今人說項斯孤山梅已熟滋味獨君知可人期不至日日望山孤不是招吟侣多應覔酒徒虗名付蕉鹿清興動蓴鱸見說同川好能通一葦無寄藝居京塵方衮衮君獨此安居竹簡編科斗藝香辟蠧魚眼空湖海士兒讀聖賢書一樣吟樽樂公卿未必如寄容老科擻征衣著京塵㸃涴深羡君有丘壑愧我未山林卜隱中年事懷人靜夜心何時遂歸興杯酒共清吟寄藏叟版扉常半掩人靜少經過禪思夜來得吟情秋後多月髙幡影直風定磬聲和何日同携手雲山訪薜蘿寄懷玉别去未多時征塵又滿衣憂時閽屢叩避俗手頻揮病有詩堪療貧無家可歸半生湖海上莫忘北山薇次同叔見寄二首歸期何日卜鴈不到天涯謗有書盈篋愁無地種花吟梅銷旅況刻竹記年華心事憑誰說憑欄數暝鴉昔年三笑地目斷虎溪橋立雪腰難折凌雲氣尚飄乾坤雙轍跡湖海一詩瓢樽酒何時共論文坐半宵王用和歸從莆水寄呈後村江湖從學者盡欲倚劉墻自笑塵埃眯難薰衣鉢香薜蘿緣古樹桃李背春場螢爝飄流去能依萬丈光寄頥齊蛙聲喧夜枕買靜入林居好句敲唐響清談笑晉虛素馨和月種山藥帶雲鋤閒裏多忙事篝燈課子書寄月塘懷人看皓月清夢落梅邊書債閒銷日吟魂飛上天為貧驅宦牒習懶坐寒氊但得投簪去何須二頃田寄敏齊地隔馬牛風村居野興濃宦情隨蝶夢吟鬢覺龍鍾竹外琴三疊梅邊信一封懷人不可耐山水幾千重寄適安朝宗桐隂湖水緑清氣日盈門室邇人何逺官卑道更尊詩吟唐律語琴寫古人言三妙堪名世無因得細論寄王道源南來趨斗祿出處最分明不受吏塵觸常依古道行宦情雲樣薄心事水邊清待洗巢由耳欹風聽鳯鳴寄水竹吳江江上望平處少波濤冬日思鱸鱠天風落鳯毛二難并四美獨立仰三髙秀野曽招隱清名不可逃寄抱拙割席坐春風清談滋味濃齊門聽鼓瑟長樂憶聞鐘道等千鈞重詩輕萬户封梅花今在望載酒幾時重懷悟書秋鴈欲離羣懷人幾夜分吟當半窗月坐斷兩山雲幡影無心動鐘聲出定聞林間謀隱者修潔莫如君聽宫人琴羣哇方雜奏忽聽數聲琴天地有清氣君王知正音悲風生指玉眀月照徽金曽撫昭君怨宫人淚滿襟將之官越上留别諸友一官如許冷况復是清貧槐市風何古蘭亭本却真春行蓬島外月滿鑑湖濱想得同吟者携詩舉似人山中歸呈友人擬結巖邊草懷君夜夢刀山林勝朝市道誼寄風騷壯志貧難折吟肩病越髙主人有公論清氣屬吾曹寄西澗葉侍郎擬立門前雪來時春又深望塵思北面因病負初心形役猶甘分腸枯費苦吟升堂定何日洗耳聽規針祈雪天意憐貧者冬深雪尚慳朔風吹黑道雲氣護青山色瑞占三白年豐露一斑調元人已老事體頗相關和枯崖山居韻自了塵緣後山林恨不深百年渾是夢萬事付無心秋月寮中話清風竹外吟湖東多勝踐何日共幽尋次馮深居韻贈原上人淨洗塵埃腳時來訪道林但知謀隱是何用入山深瀹茗延新話撞鐘動苦吟夜分僧出定靜聽海潮音次希道弟韻寄竹院孚上人閉門商古道細雨濕青春屬和卯君句殷勤已上人蒲團安地位秀語發天真舊日曽同社吾今愧許詢懷枯崖悟師分携方解制相約在嚴冬巖腳日千里山頭雲幾重歸裝儂自誤吟錫子何從不應天台供定知遊雪峯悟枯崖將過莆城參訪後村書此贈行吟單何日起持鉢倚劉墻蓮社招師入松隂去路長白雲迷眼界眀月照詩囊莫吸西江水風波不可當與瞻甫同訪際書記銷閒尋靜處古寺與居同坐語僧窗日行吟塔樹風香隨薝蔔化句到葛藤空未必西來者能知一葦功約枯崖話雨中曽折角䇿蹇訪僧寮待約蕉庵住莫從蓮社招清風資話柄流水走詩瓢行道知何日同携過石橋和際書記見寄人生隨聚散水面看浮萍夢入江湖社詩傳河嶽靈毫揮月穎鶴毳落霜翎未洗塵埃腳何因訪柏庭閒居寄枯崖地偏人罕到獨榻擬禪床欹枕圓殘夢推忩待晚涼行雲無定跡新月不多光安得君同社清談滋味長贈悟上人怪來趨向别乃是拙庵孫秋色添禪寂松聲奪俗喧路行須避蟻飯剩或呼猿單鉢隨緣住尋常懶出門崇福寺次枯崖韻覺城向東際寺在古松灣流水意俱逺白雲僧共閒新吟呈繡佛舊夢繞囊山勘破趙州話猶疑隔一關和枯崖悟上人韻相逢疑夙昔不擬定交初餽我詩盈軸知君腹有書空門容不得吟屬問何如云是湯休輩毋令相見踈送枯崖歸囊山江湖無足禁信步到溫陵借榻同為客打包别有僧禪心如止水詩句可傳燈已盡山隂興歸歟掃葛藤松灣訪僧一關鎖已透見性復明心佛屋燈常續禪房春又深樓空遺稿在琴古暗塵侵待約許詢輩時來訪道林山中訪枯崖歸偶成尋僧歸路逺策杖㸃苔㾗坐醉松間石行吟郭外村天風翻貝葉海氣潤墻根醉撚梅花笑心期與子論贈巖居僧清閒消不盡方覺此身尊洞古少行跡山空多燒痕靜知心是佛生與佛無恩齊料從誰給頻韲野菜根次韻送黃專玉歸莆主人情分熟客興未應䦨從古知心少只今行路難吟身霜竹瘦歸夢早梅寒若見潜夫說官清貧亦安倚窗詩倚窗成小立風伯為清塵簾捲梅當户雲開月闖人踈鐘來逺寺落葉度吟身無限關心事棲遲寂寞濱雪後一冬寒意少既雪又還晴地面氷初結天涯春已深六花隨雨化三白有梅爭袖手灞橋道懷人心事清雪中雜興四首六花正零亂却與雨相和地面頻頻化山頭漸漸皤歌樓寒較少窮巷積偏多百卉歸根後惟松不改柯獨坐看詩話瓶梅相對清瓦燈寒不暈雪屋夜偏明煨栗填飢腹煎茶長道情睡魔排遣盡窗外聽雞聲怪得簷前􅘇原來是雪消山枯空有骨水涸不成潮寒鴈鳴沙磧飢鴉啄柳條物情總如此吟鬢任蕭蕭窮通俱莫問久逺是前程涉世事多俗吟詩人較清論心缺蘭友知已有梅兄不被虛名縛江湖得散行南雪南地無寒脉胡為雪載塗草池方積玉瓦屋又跳珠魚凍難爭水鴉飢懶哺雛玉堂與茅舍隨分有紅爐寶應寺來借維摩榻披襟待晚涼鳴蜩喧古木鬥雀墮虛廊染翰題新壁移樽避夕陽二公亭畔路愛惹芰荷香次心泉卜隱韻誅茅法石巔知己有青天猿鶴尋前約山林續舊緣烟霞來枕上風月繞吟邊窗户多栽竹相期晚節堅隱者老去絶塵緣人疑行地仙釡中惟煮石囊裏不儲錢寄迹茅三架隨身詩一編雲山深處住與鶴作忘年種藥滿山巔山衣木葉聨有時扶杖出只到洞門前擊石求鮮火敲氷引滯泉深居聊避世不為學神仙戊午天基聖節口號瓣香三舞蹈咫尺是天顔雨露涵濡下風雲際㑹間寸心瞻北闕萬壽祝南山可是儒氊冷堪陪玉筍班選官圖百年窮仕宦盡在此圖中真假名雖别升沉理則同前程如漆黑末著滿盆紅時采毋虛擲平遷至上公重九日法輪庵次鳯山韻野眺逾髙阪鐘傳響外幽僧從孤寺出客倚一林秋池上烟飛去亭臯影尚留逺風山下起吹我上層樓竟日延荒寺秋聲不可歌磬中閒午至石上見寒過野鳥心常肅孤僧鬢已皤欲歸情不盡門外夕陽多送處遜渡淮謁秋壑江湖波浪惡底事欲西征去作揚州客來尋賈壘盟金山迷逺望玉樹候吟聲野鶴曽遊處登臨一愴情懷李希膺病居身懶出可是故人疏春後無佳句天邊有近書改弦知不逺製錦定何如未剗門前草難通長者車山行即事踏破幾重雲來尋别墅春促裝童僕懶題壁主人嗔瘦嶺盤山骨枯藤絡樹身野花長滿地不犯軟紅塵送松坡下第調官南歸同㸃龍門額君先賦式微自憐為客久不忍送人歸受鉞張油幕行囊富綵衣江干回首處雲樹兩依依過梨嶺作山頭日正焚山腳雨紛紛石罅疑無地樹身常出雲神靈香不斷天近路平分星斗迫人句晚唐詩亦云原注章碣送人歸閩有星斗迫人梨嶺髙之句和枯崖山行韻名山僧占盡甘作老盧能虎豹何堪捋虬龍尚可登吟隨雙蠟屐醉倚萬年藤興盡未歸去斜陽上塔層與石壁諸友山行分得山字藤蘿紆古徑努力共躋攀佛屋泉聲落僧窗雲影閒經殘香篆冷杯短錦囊慳興盡未歸去夕陽猶在山分得臺字走筆白雲最深處屐齒破蒼苔借榻尋僧話携樽領客來禽聲喧竹塢日影過花臺長嘯下山去猶傾鑿落杯次周孏窠韻風月無邊際吟身樂未央江湖三寸舌文字九回腸竹伴孤髙節梅熏暗淡香笑他蒲柳質耐得幾番霜次孏窠見寄韻園丁無擇種蕭艾雜椒蘭世俗缺真識達人當大觀無絃徒自賞有鋏莫空彈獨倚西風立推敲一字難隱真巖次翁景輔韻山林營小隱此隱未為真遺粟渾間事因金却誤人洞迷歸去路羽化本來身後此巖居者猶言寂寞濱過山庵天地一間屋心安到處家淡中嘗世味吟裏足生涯煨芋頻添炭烹泉旋品茶空山無紙帳夢不到梅花觀蟻飽知羶可慕來往鬥相迎忙似人行役多於鴈出征數行緣壁去一半上階行何處堪投宿相逢細問程秋夜欹枕卧明月西風拂帳塵病因貧作祟閒與懶為鄰意少吟難足愁多夢不真數聲窗外竹惱殺斷腸人端硯中書為尚友鐵面迫人寒易得烏龍角難逢紫馬肝石英能比玉歙好不如端曽記文闈內䝉君青眼看獨倚獨倚危樓望清風動斗牛功名兩蠻觸身世一蜉蝣樂道貧何損吟詩醉便休靜中生萬感燒燭看吳鈎久客久作他州客飄飄若轉蓬物華秋色裏心事杵聲中讀易因知命吟詩不諱窮遣愁猶未了一鴈呌西風俠客仗劔一長笑出門遊四方雄心吞宇宙俠骨耐風霜豺虎須擒攫狐狸敢頡頏大梁二壯士千古姓名香客裏客裏多風雨征衣不厭重輕車須穩駕狹路易相逢灘淺水聲激山深雲氣濃迎人野花笑絶色若為容和頥齊梅花韻寒谷有春意南枝向北山自經題品後落在是非間林外竹相亞籬根鶴伴閒折來休用插恐㸃鬢毛斑梅花窠子園丁藏密室不許雪霜欺火氣十分燠春風第一枝橫斜無定影屈曲漫趨時人力奪天巧東君未必知落梅謝娥三弄笛錯恨五更風樹老餘香少花殘瘦影空深堆和靖墓淺㸃壽陽宫結果重來此方知造化工錢塘江待潮潮至千艘動濤喧萬鼓鳴江翻晴雪卷海漲石塘平帆影林端見波光屋上明青山自吳越相峙兩含情雨中有懷一天風雨暗樓外失青巒枕簟三更夢襟懷六月寒酒船知獨載詩卷為誰刪咫尺松灣路思君欲見難哭墓拜親親不待事事與心違萬里有歸日九泉無見時愁生新緣綬淚滿舊斑衣從此白雲斷何當慰所思題村居壁何處村居好山邊况水邊數間茅屋下一帶槿籬前繞舍千竿竹傳家二頃田但求安樂法不必問流年書懷貧居無外事圖得念頭清冷眼觀時政平心閲世情好花臨水種瘦竹傍墻生自足供幽致何須隱姓名世途世途猶炙熱一雨便成秋長嘯風生腋孤吟人倚樓生涯付杯酒清夢繞魚舟壯士悲何事湖山憶舊遊將樂縣石徑盤千折林楓大十圍山如昌化縣水似弋陽溪樓閣層層畫田園種種宜惜非鄉國逺有意卜幽棲賦玳瑁魚海靈如許巧龜貝㸃成紋背負十三卦旁分四六文殼中藏勺水身後管梳雲貴介諸公蛻何因得似君雪晴雲解雪初晴青山依舊青水涵霜夜月梅落曉天星造物無今古人生幾醉醒倚樓吟未足更上武林亭懷錢塘舊居錢塘漂泊久别後夢連宵忽聽灘頭水猶疑江上潮暗塵侵竹簡夜雨洗芭蕉料得蘇堤路西風犯柳條西溪即事柴門斜對水一徑鎖松蘿積雨溪流急閒雲山占多村莊留客飯樵父教兒歌聽得田間語安排收晚禾憶昔憶昔嵗云暮狂吟天一涯江湖聊寄跡時節最思家有擔空行李無盤可頌花寒梅帶香味相伴守年華題水竹居雲根無覔處藏在此山阿地僻塵緣少心清詩料多竹虛元有節水止故無波甚欲投簪去同君住薜蘿夜行口占夜程多晦昧舉步要分明肯以中途廢須尋直道行心燈長不燼眼鏡自然清白晝昏迷者荆榛滿路生病後呈藝居病骨清於鶴臨風直欲飛閒多酬病債吟苦費心機帶緩腰圍减囊空藥裹稀未能全謝客扶杖掃林扉腰痛門前齊雪立因被病相魔堪佩金魚否能懸寶劍麼折非陶令懶瘦似沈郎多已辦揚州鶴其如十萬何與杜友定花朝之約花朝曽有約來此定詩盟隱几江湖夢閉門風雨情身名千載共心事一般清且盡吟樽樂徂徠不用賡桃源圖桃源分二種半在此源栽向為逃秦去今還歸趙來山川猶古昔人物不塵埃劉阮何為者無言空自回題葉石軒學僧寮靜坐求心印傳經續祖燈因吟呈佛句方悟在家僧藝葉熏薝蔔枝辭剪葛藤自從罵師後無話可參承髙陽山逺眺龍尋多偉觀立馬少徘徊地僻風埃少天成圖畫開僅留官驛在無復酒徒來一鴈長空去憑髙呌不回金陵龍虎猶盤踞前頭白鷺洲為今形勝地往昔帝王州人物金陵古風煙玉樹秋六朝羅綺迹分付大江流掩目新亭路人言似洛陽山河多改變今古幾興亡有觀空鳷鵲無臺棲鳯凰當年足歌舞不擬是偏方南浦修途無好况滿面受風埃見說山窮處曽經水患來溪橋橫獨木田野長荒萊薄暮投孤館寒猿聲更哀次烟浦即事韻吟帆歸路逺花雨落紛紛鷺過山加㸃鷗飛水破紋淡烟依古樹殘照下空墳未見巫陽面髙塘韻漫分觀碁聞近事有感盤中無活路敗局幾番新好著輸前輩危機遜後人靜邊閒袖手窮處巧翻身黑白無分别歸歟當自陳仙霞嶺未了江湖債風霜鬢欲華吟身長是客旅舍不如家山色籠晴晝湍聲潄淺沙不因韁鎖縶來此老烟霞九日客中逢九日此日倍思家野店篘無味疏籬菊未花龍山孤節物鴈影各天涯一路看秋色微吟解嘆嗟離家大笑出門去江湖天地寬耐貧為客易生計靠詩難日月雙車轂功名百丈竿上林有嘉樹且擇一枝安小吳園臨水開門徑關防俗子來竹添當户筍梅老靠墻枝嵐氣侵衣袂湖光媚酒巵主人全謝客時遣鶴相隨集芳園園丁嚴鎖鑰不許俗人看梅落黃金彈荷開碧玉盤小舟維柳外青磬出林端猿鶴不相識行吟獨倚欄元日元日復元日吟邊閲嵗華淺斟浮柏葉清坐對梅花人事年年改生涯步步差詩情無厚薄春意又萌芽無塵殿劫灰飛不到人迹少曽來浪說珊瑚樹空涵玉鏡臺洞虛風度竹泉冷石無苔汩汩樊籠者何因避世埃春晚遊蔣園次韻挽住斜陽腳殷勤向小園柳眠猶學舞花笑獨無言自擬湖山景親承雨露恩祇愁人散後腐草㸃苔痕問陳禹錫太博病脉虛非别症身坐蠧魚癡造物不青眼江湖此白眉近年書不至逺宦夢相隨遣病無他囑加餐誦杜詩病後病髮凋零後朱顔似舊無愁多詩債减貧劇故交疏風挾砧聲急雲拖鴈影孤夜來長不寐欹枕看方書哭藝居錦囊方絡繹忽報殞吟身泉壤悲千古江湖少一人病懷詩眷屬醫缺藥君臣脂嶺西風急興思暗愴神元日次韻才書元旦帖清事繞吟身杖履堪行樂簟瓢不似貧燈花天外喜池草夢中春強飲酴酥酒陶陶太古民浴溫泉萬水皆清冷溫泉獨爾竒硫黃聞俗論礜石見唐詩鷗鷺何曽下魚龍定不知無人發根本空使世常疑和梅臞瀑布韻銀河清夜決一派落巖前雷激驚龍蟄霜飛冷鶴眠醉鄉思入聖吟骨欲登仙世路風波惡山中别有天倚樓樓髙天一握山入白雲根寺在牛鳴地人行犬吠村晴窗薰野馬寒木下孤猿吟罷月初上詩僧來扣門寄梅臞别去忽經旬春風閲二分幾番吟對雨獨自暗思君客裏加頻病愁邊駭近聞倚欄商不得心目亂於雲寄黃雲心竹屋少行跡閉門春晝長天時半晴濕人意共炎凉苔蘚侵階緑荼䕷壓架香冥搜尋杖履不為看花忙靜中靜中天地濶嵗月聽悠悠往事渾如夢長江不盡流蛩吟似懷古鴈陳去防秋習得看山癖終朝懶下樓身事身事未如意眉頭不暇攢青衫笑官冷白屋帶儒酸癖性生來淡中年貧最安不為溫飽計儘可耐饑寒次韻抱拙即事一嘯立東臯輕寒侵二毛曉光浮野草春色染夭桃有水池添滿無雲山更髙清源何日約掃石共歌騷次韻琛庭即事吏塵飛不到官况儘凄凉實貨歸周府虛名屬晉堂日移槐影轉風細荔花香若問公私事閒蛙話最長一第六年收一第不特為榮身殿下拜明主堂前有老親衣冠新進士湖海舊詩人誤入功名網歸來負釣綸喜郭吉甫擢第調尉八柱還里一第全家待君今衣錦歸折來新月桂忘却故山薇祿近鸂呈瑞官清馬不肥海門西去路歸鳥故飛飛欽定四庫全書葦航漫遊稿卷三宋胡仲弓撰七言律詩頥齊再作催梅詩次韻但是南枝盡向陽凝寒未許暗傳香水邊疏影空浮月嶺外孤根淺帶霜北帝無因全漏泄東君何事巧遮藏好將羯鼓花前報莫待狂風破麝囊送李茂先去國榻前一疏犯龍顔身在危疑進退間自是直言難見售却於大義頗相關孤忠力為朝廷計衆望公歸臺省班畢竟名髙人所忌且移别眼看青山嚴子陵釣臺聘幣凡三到水涯東都莫是缺人才當時若使無新室此地安知有釣臺魚水相忘身外樂羊裘曾卧禁中來桐江一派清如昨千古髙風挽不回卧聽卧聽芭蕉捲雨聲熟梅天氣半隂晴幾年不作雲山夢特地來尋泉石盟竹杖芒鞋方得意桃笙葵扇又關情清和時節如寒食昨日街頭人賣餳次韻山居夕陽漏影射疏林三兩人家桑柘隂鶻過桚開歸鳥路鐘敲撞碎野猿心常因境勝甘忘食不為家貧輒廢吟說與門前樵牧者日間過此可相尋送後村去國二首人言責備過春秋笑出修門肯怨尤去國早知如許急勸君何事莫來休是非不信無公論勝負常關第一籌史筆未青先結局天刑人禍免推求纍疏箋天乞掛冠此時便合整歸鞍玉音不許難輕去局靣那知竟未安但得中朝常有道何妨右史左遷官此行不被梅花纍把作尋常物外看寄吳警齊去國翩翩又許時愛君何日不攢眉二賢出處分明甚四誎聲名今似之朝奏一封排佞疏暮收千首餞行詩山林若問朝廷事寶劍年來正倒持原注二賢謂潘南夫同日出臺豸冠風采動簪紳天子如何不得臣去後赤心常體國從前冷語頗冰人好官盡屬時賢做近事看來局靣新輪轍深依梅竹下一僮一鶴伴吟身九月八日寄孏窠轉盼重陽在眼前客中嵗月浪推遷雲飛千里家何處鴈過一聲秋滿天節近最關萱草夢囊空猶缺菊花錢瞑心九日山頭路雖不登髙亦惘然寄默菴剩得吟身漫浪遊機心猶在莫盟鷗一枰碁裏乾坤大九節笻邊嵗月流涉世間關如履險憂時感慨似悲秋但營二頃閒田地却笑區區萬户侯寄松坡别去京華又一霜懷人心事暮雲長髙樓不見青山靣明月偏來照屋梁湖海最深難久駐乾坤許大任行藏書生空抱憂時憤何日與君同較量寄適安别來不作故人書堪笑癡翁懶有餘世路每於平處險交情多是密中踈梅花至老香猶在竹節雖髙心本虛門對青山無一事便教草長不須鋤和丘君就見寄曾坐當年阮籍途功成何敢嘆桑榆嚼來世味十分淡吟得詩腸一半枯向日有書干北闕只今無夢到西湖訪君欲話前頭事怕被秋風吹病軀寄順適標格因詩總不羣眼前餘子漫紛紛江頭社裏新知已文字行間舊識君心事正須豪傑道吟聲莫遣鬼神聞歲寒消得梅花伴肯共扁舟載白雲寄沈迂叟鴈飛不到瘴江邊别去而今又一年放下客愁非為酒擡髙詩價莫論錢從來富貴皆尤物休把行藏問老天世味料君如嚼蠟白雲堆裏且安眠寄姚省齊笑俯修欄一缺伸年來踪迹尚埃塵幾曽隻字商量酒强把篇詩料理春風雨無情鶯口噤江山有恨柳眉顰不知桃李成隂未我欲行吟避醉人寄李適安懶踏門前沒馬塵適安亭上坐吟身殷勤風月一樽酒斟酌湖山十里春栁葉未舒先嫵媚梅花雖老更精神白鷗似㑹冥搜意來往忘機欲傍人寄李希膺二首醉倚危欄望海鯨乍看潮落又潮生眼中世界粟來大身外乾坤葉樣輕鷗鷺行藏無俗迹魚龍變化詎虛聲冥搜誤入蠻烟去秖恐梅花句未清緑玉樽前笑語嬉青燈影裏坐彈碁交情又屬後來者樂事何如初見時山寺論文辭太苦海樓握手句尤竒歲寒不見梅花靣辜負暗香疏影詩次秀野使君見寄分閫南來征弗庭薦賢須到李陽冰不從沙漠去投筆便向雲山學負苓鈴閣祗今增璽綬路車何日飾鈎膺匣中古劍牢收拾下取須防有六丁寄戴石屏子入天台我入閩歸來又見六畨春鴈書乏便通安道鶴頸長延望叔倫吃藥未􅑮醫國手聼琴誰見賞音人年來屢作江湖夢細嚼君詩當問津寄趙西巖自分男兒未著鞭龍駒伏櫪更多年張儀舌在堪謀國阮籍途窮只問天彈鋏空歌雲夢句焚香靜讀楚騷篇吟魂常繞江湖上莫道閩中無杜鵑送謝刑部使君赴召擲奸方喜俗無譁一札飛來墨敕斜職業已升金掌貴吏民空擁綵旗遮絳車趣召二千石輿頌歡傳十萬家桃李競隨春腳去僅留遺愛在桐花中和報政二年間五馬朝天不可攀南國願留申伯住東山催起謝公還銀鈎鐵畫輝棠䕃玉鑑冰壺照笋斑名在御屏推課最前途重見璽書頒泛湖晚歸式之有詩見寄因次其韻晚趁歸舟醉復醒一湖烟水淡冥冥自憐吟鬢新添白强學遊人去踏青足跡未經龍井寺夢魂常繞冷泉亭何時携手同登覽花滿烏紗酒滿瓶原注諸友有龍井之約故云蔡司業爭公議而去詩以送之此舉朝廷繫重輕先生直以去為榮但令天下無邪黨不願吾曹有令名模楷昔曾宗李氏搢紳今盡說陽城是非公論從來定少待前頭風浪平頥齊詩筒急遞次韻奉酬一日懷人三閲秋白鷗飛去水悠悠江山磨盡古今事風雨送來天地愁蝸喜自㳂商隱壁燕歸錯認仲宣樓笛聲只在欄干曲須向西鄰髙處求再和頥齊見寄胸懷拍拍貯陽秋萬里江山思逺悠自笑半生行酒禁可能一日免詩愁圖書圍裏誰分榻風雨中間獨倚樓除却知心吾與汝吟邊何事冀旁求立春移文火急報花神好趁陽和去問津未轉頭間猶是臘一彈指頃便為春梅先得志求専寵栁亦趨時願效顰造化但隨人事改幾回粧㸃幾回新泠風閣髙閣凌雲四望賖劔城橫案俯千家乘風列子留行館飛舄王喬有别衙天女下遊簫引鳯仙人來宴棗如瓜溪山勝絶非塵世帆過真疑海上槎西湖懷古水拍平堤欲蘸天濯纓人在小橋邊古今塵世知多少滄海桑田幾變遷駝巘勳名無竹寫孤山衣鉢有梅傳誰能撰取西湖傳持到玉皇香案前旱湖老天動是一年晴怪底遊人不出城湖上幾時無好况堤邊近日少吟聲草深盍放牛羊牧水涸難尋鷗鷺盟但得孤山梅不死其他風物弗關情晚眺數㸃寒鴉過别村晚來秋色眼中分木從闕處留殘照山欲昏時雜亂雲兩岸草深蟲語話一汀沙白鳥耕耘林間僧舍知何處回首鐘聲逺近聞幾度徘徊對暮天懷人珍重寄詩篇原注方時父以吟卷見示是日送還古今上下幾千首天地中間八九椽喚醒吟魂歸濁酒移將傑句上華顛南來諸老凋零盡回首斜陽倍黯然次趙同叔春雨中韻焚香清坐話襟期絶勝孤􅏃共載時曉雨旋添山蕨菜春風又上海棠枝蝶隨癡夢飛丹闕鶯帶吟聲繞墨池小待隂晴何日定不成學圃事樊遲結交嘆湖海相逢一笑嬉納交如此豈男兒論心盡道同蘭臭臨事無聞伐木詩管鮑雖貧猶忍棄左羊至死更相知歲寒不負松筠約除却梅花耐久誰冬雨即事寄趙默庵梅尚花時便作霖兒童造化本無心保身獨鶴歸華表噤口羣鴉集禁林物態盡隨時改變天公不管世晴隂絶憐西北風寒地萬騎屯中雪正深春日過西湖百花如錦栁如烟粧㸃西湖二月天便道過從來四聖扁舟旖旎訪三賢錢塘門外蘇堤上豐樂樓前芝寺邊箇裏萬般俱索價惟餘風月不論錢九日山拜姜相遺像别駕元來是重臣窮通不足纍其身直言悟主成遺恨徑節如公能幾人泉瀉冡堂垂鶴淚苔封碑石剝龍鱗至今繪像丹青手難寫靈臺一㸃真次梅莊守歲韻吟邊闒茸過年餘萬斛塵襟未掃除守歲有人獻椒頌辟邪無術諉桃符屠蘇不飲防心醉春帖慵裁缺句書說與江湖諸老大浮生消得幾桑榆近事近事山中總不知心清常是太平時勿於貧後方求藥才得閒來便賦詩千里白雲勞夢想一天明月負襟期有書堪讀梅堪看絶倒人間富貴癡賀林自知兄登第賀客來遲休怪余新篇凖備暮春初羣兒得志誠逾望一第於君非有餘喜脫平生場屋債飽看太古聖賢書由來天爵無窮樂人爵雖榮百不如秀野主人風度不塵埃幻作東西兩洞來惟有桑田變陵谷直從心地起樓臺水于曲處流觴出山到盡頭留屐回倦客幾時歸去得稅園隨分買花栽送湯武諭倅吳門諸賢出處最關時獨有先生早見機漢匱昔曽藏諌筆吳江今可浣朝衣剩留千古清名在帶得一身公論歸世事如碁吾懶著敢將局靣例言非郊行即事貪看梅花短作程吟鞭不動馬蹄輕村莊到處如知已物色於人亦有情去㕍逺連潮水落亂山低與暮雲平倚欄無語閒商略此景誰能畫得成富沙水後次壁間韻聚落成墟空白烟亂鴉飛繞夕陽邊大江東去有遺恨流水西來無渡船青女魂遊花委地王孫腸斷草連天一樽欲酹故人酒知是瑤池第幾仙送月塘回藍溪仕路無媒且折枝官清不必計髙卑塞翁失馬庸奚損海客盟鷗盍見疑世狹有材無用處家貧擇宦欲何之藍溪溪上風波少自把梅花自賦詩可山席上爐亭鎮上坐書癡不似山居得自怡傾竹葉杯延舊友倚梅花樹看新詩嚼來此味清于水語對鄉情甘似飴外此不須談近事相逢一笑且舒眉和抱拙韻關關鳩婦亦收聲天意猶慳一日晴槐緑儘供春晝夢梅黃尚憶歲寒盟海邊書托文鱗便户外詩來喜鵲鳴千里宦情隨處好秋風何用記蓴羮倚樓長笛兩三聲雲淡風輕弄曉晴翰墨林中新體製江湖社裏舊宗盟不堪甕牖聞蟬噪獨喜梧岡聽鳯鳴安得坡仙同把酒山間玉糝可分羮和希膺韻醉將濃墨寫烏絲湖海相逢彼一時洗竹僅留墻外筍買花空揀擔頭枝白鷗早已寒前約青鳥誰知誤後期惆悵玉簫聲已斷倚䦨重省寄來詩和李希膺見寄半生幾坐阮途窮可是推敲得句工所見豪雄惟子共此音今古更誰同西風有檄催行李明月無情照酒筒我去君留差左計媒身豈在泛蓮紅有感時事湖濵别去五經秋喜得閒居無悔尤華藻不因焚硯棄功名直待蓋棺休北山何假移文檄西事猶堪借箸籌四海茫茫才思竭如君尚向古人求近聞怒髮欲衝冠便有驊騮懶駕鞍入洛幾年為計密擎天八柱果誰安力排魏闕扶公論人謂膺門出好官猶幸甘陵無部黨不然世事不堪看上元觀燈月掛墻頭楊栁枝繁燈爛漫玉琉璃綺羅盡學宫粧樣歌舞休傳外國詞滿路競看花灼灼故京誰念黍離離他年同侍傳柑宴記取樓前擲果時題溪亭借得溪亭一解衣忘機燕子去來飛採桑女伴携籃過罷釣兒郎蕩槳歸嫩草正芳鵝鴨鬬淺潮初落蟹魚肥開門坐對真山水不信人間有是非陳氏溪亭次韻溪亭鎮日著吟身不浣衣中一㸃塵水比世間機巧者山如前輩典刑人喚回魂夢敲茶臼費盡工夫整釣綸時有野僧排闥至炷香清坐話頭新溪亭夜吟繫纜隄邊江水平風來細細襲衣輕淡烟幾抹沙痕暗新月一鈎天際明錦繡圍中搜野趣笙歌叢裏和吟聲酒䦨不盡遲留意後約須尋李杜盟元日元日山堂羅俎豆潛知木主亦悲辛土瓜原注似薯蕷而稍圓溪筍非鄉物臠肉村醪擬降神盡日閒門無賀客侵晨官道有行人喜將弟妹同漂梗綵服團欒壽老親題桃源圖桃溪春水緑如苔溪上紅桃夾岸開乳燕掠將芳草去子魚銜出落花來田中黍稷隨時藝雨後桑麻繞舍栽此日逄人休問語生涯聞已半蒿萊圖中想像晉桃源問著桃源不敢言只道亂來無境土誰知靜裏有乾坤年深莫辨烟霞迹洞古猶粘苔蘚痕吟杖懶隨劉阮去漫尋春色到柴門題窗間墨竹一寸毛錐當小鉏新篁移傍野人居難棲天上鳴陽鳯且伴窗前剔蠧魚大節肯隨風俯仰數枝長帶月扶疏此君本是虛心物那更形聲總是虛走筆和法石紀遊贏得工夫卧看山山中地步較來寬苛留一段乾坤在耐過幾畨風雨寒吟思正濃頻掃石醉眸未豁且觀瀾連鼇已落髙人手却是漁家缺巨竿訪枯崖不遇踏破門前苔蘚斑尋曦不值只空還行雲過處青山濕野水明邊白鳥閒捫蝨有人談古道揮蠅無路透禪關杖藜獨背西風去偶見蒼官亦厚顔哭杜立齊先生鳯鳥才看刷羽儀胡為遽報哲人萎可憐如晦遄歸日不及唐朝既效時善類固知難著腳小人未可便揚眉老天欲壽斯文脉後死當為繼絶思哭趙吏部篇詩曽送恥齊行豈料存亡隔此生早控危衷敷鯁論晚留遺愛在羊城惜無金輅封同姓空有玉棺歸九京篋笥舊藏君雜藁令人一讀一傷情次郭吉甫梅仙之官廣右路入天南更向西春風匹馬赴瓜期折將官栁送行客歸及山梅結果時池上鳯凰身未到灘頭鸂鶒事先知徐君曽下陳蕃榻况是林宗早見推原注徐有功時帥廣右和止泓姜秦祠韻九日山頭兩徑深不同出處却同心喚回浮世夢中夢來向先生吟處吟别駕堂空遺影在隱君亭破野藤侵古今陳迹休深問且把寒泉當酒斟西塔杖䇿來尋塔廟仙半程便到碧霄邊三千世界浮塵外百二山河在眼前誰把孤標長插地只消一柱可擎天夜闌籟靜憑欄聽隱隱星河人扣舷次韻答王東墅兀龍湖海分棲遲懶把琴心纍子期不是三生曽有舊如何一見便論詩春行谷外鶯求友月在吟邉鵲繞枝甚欲買舟尋隱處悔將名姓與人知答頥齊詩筒走寄才聽簷花㸃滴聲錦囊入手便欣情啼乾杜宇春言别賦到牡丹詩改盟洗滌愁腸憑酒遣揄揚心事借琴鳴詰朝紫翠欄邊約喜有溪毛可絮羮剪燭西窗聽雨聲曉天又弄半隂晴黃金塢裡知無分紫翠樓前忍負盟君有磚花占日影我慚瓦釡答雷鳴今朝茹素無清供喜得鄰分玉版羮緑隂團裡和吟聲幽事相關雨未晴莫把越秦分異見要知李杜是同盟提壺沽酒墻頭報布穀催耕屋背鳴滿目雲山猶好在何時雞黍薦藜羮春日春事都無十日留何妨欵段出城遊榴花不入詩人眼栁絮偏供客子愁枝上五禽言似訴籠中二鼠去如流斜風細雨湖山路一片花飛人倚樓餞儲秀野赴廣西制司參議時艱急似救頭燃快趁春風著一鞭人道輕車諳路熟我疑重閫得君賢狨衣便帶楊花雪鶴骨猶勝桂嶺烟兵畫近來無可議只消買靜向南邊次傅德用府教授韻一握乾坤盡在望江山好處即家鄉古今萬事雲來去身世百年亭短長夢裏有時曽化蝶吟邊得意亦亡羊是非寵辱渾閒事付與天公為較量送吕時可監丞朝假歸里局靣新更著數寬如何國手要投閒逆知後日清流禍厭作中朝時樣官兄弟真情求去易君臣大義學來難玉音不許違三月此意應須反覆看次雪舟進退韻誰肯因貧賣寶刀半生湖海分蹉跎春回池草吟魂覺月在梅花瘦影髙旅况又隨年事長交情偏耐嵗寒多項斯標格逢人說讀到新詩語更騷霸王廟慓悍攻城大不仁拔山力盡誤終身當初不學古兵法到了翻成霸罪人未造漢時知有漢豈堪秦後又生秦咄嗟氣象今何在千古空留土木神張巡廟說著睢陽膽已傾單師曽此控孤城一身肯作偷生計千古長留不死名廟饗母忘艱食日庭松猶學戰時聲祠前碑記無尋處賴有唐書為發眀
